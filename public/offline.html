<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViWallet — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1625;
      color: #e8e0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem;
    }

    .card {
      background: #2a2040;
      border: 1px solid #7c3aed33;
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px #0008;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #e8e0f0;
    }

    .wifi-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: #3d2f5e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wifi-icon svg {
      width: 32px;
      height: 32px;
      stroke: #c084fc;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #e8e0f0;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.95rem;
      color: #a89dc0;
      line-height: 1.6;
    }

    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #c084fc;
      border-radius: 50%;
      margin-right: 0.4rem;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .status {
      margin-top: 1.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      color: #7c5fa0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">&#128181;</div>
      <span class="logo-text">ViWallet</span>
    </div>

    <div class="wifi-icon">
      <svg viewBox="0 0 24 24">
        <line x1="2" y1="2" x2="22" y2="22"/>
        <path d="M10.72 5.08A10.94 10.94 0 0 1 12 5c2.56 0 4.9.9 6.72 2.38"/>
        <path d="M5.28 9.72a7.94 7.94 0 0 1 2.7-1.96"/>
        <path d="M10.71 10.71a4 4 0 0 1 4.58 4.58"/>
        <circle cx="12" cy="19" r="1" fill="#c084fc" stroke="none"/>
      </svg>
    </div>

    <h1>You're offline</h1>
    <p>ViWallet will reconnect automatically.<br/>Your data is safe and syncs when you're back online.</p>

    <div class="status">
      <span class="pulse"></span>
      Waiting for connection&hellip;
    </div>
  </div>
</body>
</html>
